name: PaperPilot CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: python -m pytest

      - name: Run minimal demo
        run: |
          python -m paperpilot init-case ci_demo_case
          python -m paperpilot run cases/ci_demo_case/case_config.yaml
