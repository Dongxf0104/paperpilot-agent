project:
  name: toy_regression
inputs:
  paper:
    path: docs/legacy_experiments.md
    summary: Lightweight toy regression benchmark planning example for baseline workflows.
    claimed_contributions: [adapter workflow, benchmark reporting]
  repository: .
dataset:
  path: examples/toy_regression/sample_dataset.csv
  target: y
task:
  type: regression
  split: deterministic 80/20 holdout
  seed: 0
metrics: [mae, mse, rmse, r2]
baselines:
  - name: mean
  - name: linear_regression
method_repos:
  - name: example_method
    path: examples/external_method_repo
outputs:
  dir: outputs
